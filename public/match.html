<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Partida — CS2 Tracking</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-shell min-h-screen">
    <nav class="glass-nav sticky top-0 z-20">
      <div class="nav-inner">
        <a href="/profiles" class="brand">
          <span class="brand-mark">CS</span>
          <span>Tracking</span>
        </a>
        <div id="nav-guest" class="nav-links">
          <a data-nav="/profiles" href="/profiles" class="nav-link">Perfis</a>
          <a href="/" class="btn-primary text-sm py-2 px-4 no-underline">Entrar</a>
        </div>
        <div id="nav-authed" class="nav-links hidden">
          <a data-nav="/profiles" href="/profiles" class="nav-link">Perfis</a>
          <a id="nav-sala-link" data-nav="/sala" href="/sala" class="nav-link">Sala</a>
          <a id="nav-conta-link" data-nav="/conta" href="/conta" class="nav-link">Minha conta</a>
          <a id="nav-admin-link" data-nav="/admin" href="/admin" class="nav-link hidden" style="color: #fcd34d;">Admin</a>
          <span class="nav-sep hidden sm:inline">|</span>
          <span id="nav-username" class="nav-link" style="cursor: default;"></span>
          <span id="nav-role" class="badge-user"></span>
          <button id="logout-btn" type="button" class="btn-ghost text-xs">Sair</button>
        </div>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8 pb-16">
      <a id="back-link" href="/profiles" class="text-sm text-slate-500 hover:text-orange-400 inline-block mb-6">← Voltar</a>

      <p id="match-error" class="hidden text-red-400 text-sm mb-4"></p>

      <section id="match-header" class="hero-account mb-6 hidden">
        <p class="text-xs uppercase tracking-widest text-orange-400/80 mb-1">Detalhe da partida</p>
        <h1 id="match-map" class="text-3xl font-bold capitalize">...</h1>
        <p id="match-meta" class="text-slate-500 text-sm mt-2">...</p>
        <p id="match-score" class="text-xl font-bold mt-3 text-orange-400">...</p>
        <p id="match-self" class="text-sm text-slate-400 mt-2 hidden"></p>
      </section>

      <p id="scoreboard-hint" class="hidden text-xs text-slate-500 mb-4 card px-4 py-3">
        O CS2 só envia todos os jogadores em modo espectador/demo. Em partidas normais pode aparecer só você.
      </p>

      <section class="card overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-800/80 flex flex-wrap items-center justify-between gap-2">
          <h2 class="font-semibold">Scoreboard</h2>
          <span id="player-count" class="text-xs text-slate-500"></span>
        </div>
        <div class="overflow-x-auto">
          <table class="scoreboard-table w-full text-sm">
            <thead>
              <tr class="text-slate-500 text-xs uppercase tracking-wider">
                <th class="text-left p-4 font-medium">#</th>
                <th class="text-left p-4 font-medium">Jogador</th>
                <th class="text-center p-4 font-medium">K</th>
                <th class="text-center p-4 font-medium">A</th>
                <th class="text-center p-4 font-medium">D</th>
                <th class="text-center p-4 font-medium">K/D</th>
                <th class="text-center p-4 font-medium">MVP</th>
                <th class="text-center p-4 font-medium">Pts</th>
              </tr>
            </thead>
            <tbody id="scoreboard-body"></tbody>
          </table>
        </div>
        <p id="scoreboard-empty" class="empty-state hidden">Sem dados de jogadores nesta partida.</p>
      </section>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/match-ui.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/match.js"></script>
</body>
</html>
