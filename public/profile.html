<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfil — CS2 Tracking</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-shell min-h-screen">
    <nav class="glass-nav sticky top-0 z-20">
      <div class="nav-inner">
        <a href="/profiles" class="brand">
          <span class="brand-mark">CS</span>
          <span>Tracking</span>
        </a>
        <div id="nav-guest" class="nav-links">
          <a data-nav="/profiles" href="/profiles" class="nav-link">← Perfis</a>
          <a href="/" class="btn-primary text-sm py-2 px-4 no-underline">Entrar</a>
        </div>
        <div id="nav-authed" class="nav-links hidden">
          <a data-nav="/profiles" href="/profiles" class="nav-link">Perfis</a>
          <a id="nav-sala-link" data-nav="/sala" href="/sala" class="nav-link">Sala</a>
          <a id="nav-conta-link" data-nav="/conta" href="/conta" class="nav-link">Minha conta</a>
          <a id="nav-admin-link" data-nav="/admin" href="/admin" class="nav-link hidden" style="color: #fcd34d;">Admin</a>
          <span class="nav-sep hidden sm:inline">|</span>
          <span id="nav-username" class="nav-link" style="cursor: default;"></span>
          <span id="nav-role" class="badge-user"></span>
          <button id="logout-btn" type="button" class="btn-ghost text-xs">Sair</button>
        </div>
      </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8 pb-16">
      <a href="/profiles" class="back-link">← Voltar ao ranking</a>

      <p id="own-account-banner" class="hidden mb-6 card px-4 py-3 border-orange-500/30 text-sm text-slate-300"></p>

      <section class="hero-account mb-8">
        <div class="flex flex-wrap items-center gap-5">
          <div id="profile-avatar" class="avatar text-2xl">?</div>
          <div>
            <h1 id="profile-name" class="text-3xl font-bold">...</h1>
            <p class="text-slate-500 text-sm mt-1">Membro desde <span id="profile-since">—</span></p>
          </div>
        </div>
      </section>

      <section class="grid grid-cols-2 sm:grid-cols-4 gap-4 mb-8">
        <div class="stat-card"><p class="stat-label">Partidas</p><p id="stat-matches" class="stat-value text-orange-400 mt-2">0</p></div>
        <div class="stat-card"><p class="stat-label">K/D/A</p><p id="stat-kda" class="stat-value text-sm mt-3">0/0/0</p></div>
        <div class="stat-card"><p class="stat-label">K/D</p><p id="stat-kd" class="stat-value mt-2">0</p></div>
        <div class="stat-card"><p class="stat-label">MVPs</p><p id="stat-mvps" class="stat-value mt-2">0</p></div>
      </section>

      <section class="card overflow-hidden">
        <div class="px-5 py-4 border-b border-slate-800/80">
          <h2 class="font-semibold">Historico de partidas</h2>
        </div>
        <div id="profile-matches"></div>
        <div id="profile-matches-empty" class="empty-state">
          <p class="text-slate-400">Sem partidas registradas</p>
        </div>
      </section>
    </main>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/match-ui.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
