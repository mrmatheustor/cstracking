<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Perfis — CS2 Tracking</title>
  <link rel="stylesheet" href="/css/app.css" />
  <script src="/js/theme.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="app-shell min-h-screen flex flex-col">
    <nav class="glass-nav sticky top-0 z-20">
      <div class="nav-inner">
        <a href="/profiles" class="brand">
          <span class="brand-mark">CS</span>
          <span>Tracking</span>
        </a>
        <div id="nav-guest" class="nav-links">
          <a data-nav="/profiles" href="/profiles" class="nav-link active">Perfis</a>
          <a href="/" class="btn-primary text-sm py-2 px-4 no-underline">Entrar</a>
        </div>
        <div id="nav-authed" class="nav-links hidden">
          <a data-nav="/profiles" href="/profiles" class="nav-link active">Perfis</a>
          <a id="nav-lobby-link" data-nav="/lobby" href="/lobby" class="nav-link">Lobby</a>
          <a id="nav-profile-link" data-nav="/profile" href="#" class="nav-link">Perfil</a>
          <a id="nav-settings-link" data-nav="/configuracoes" href="/configuracoes" class="nav-link">Configurações</a>
          <a id="nav-admin-link" data-nav="/admin" href="/admin" class="nav-link hidden" style="color: #fcd34d;">Admin</a>
          <span class="nav-sep hidden sm:inline">|</span>
          <span id="nav-username" class="nav-link" style="cursor: default;"></span>
          <span id="nav-role" class="badge-user"></span>
          <button id="logout-btn" type="button" class="btn-ghost text-xs">Sair</button>
        </div>
      </div>
    </nav>

    <main class="page-main flex-1">
      <header class="page-header center">
        <p class="page-eyebrow">Ranking público</p>
        <h1 class="page-title">Perfis dos jogadores</h1>
        <p class="page-desc">Clique em um jogador para ver estatísticas e histórico de partidas.</p>
      </header>

      <section class="profiles-toolbar">
        <div class="profiles-toolbar-inner">
          <div class="profiles-search-wrap">
            <label class="sr-only" for="profile-search">Buscar jogador</label>
            <input
              id="profile-search"
              type="search"
              class="input-compact profiles-search"
              placeholder="Buscar jogador..."
              autocomplete="off"
            />
          </div>
          <div class="profiles-toolbar-filters">
            <label class="profiles-field">
              <span class="profiles-field-label">Ordenar</span>
              <select id="profile-sort" class="input-compact">
                <option value="rank">Ranking</option>
                <option value="name">Nome</option>
                <option value="kd">K/D</option>
                <option value="kills">Abates</option>
                <option value="mvps">MVPs</option>
              </select>
            </label>
            <label class="profiles-field">
              <span class="profiles-field-label">Partidas</span>
              <select id="profile-min-matches" class="input-compact">
                <option value="0">Todas</option>
                <option value="1">1+</option>
                <option value="5">5+</option>
                <option value="10">10+</option>
              </select>
            </label>
            <label class="profiles-check">
              <input id="profile-only-active" type="checkbox" />
              <span>Com partidas</span>
            </label>
            <button type="button" id="profile-clear-filters" class="profiles-clear-btn" title="Limpar filtros">Limpar</button>
          </div>
        </div>
        <p id="profiles-count" class="profiles-count"></p>
      </section>

      <p id="profiles-empty" class="empty-state hidden">Nenhum jogador cadastrado ainda.</p>
      <p id="profiles-no-results" class="empty-state hidden">Nenhum jogador encontrado com esses filtros.</p>
      <div id="profiles-list" class="profiles-grid"></div>
    </main>

    <footer class="site-footer">CS2 Tracking</footer>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/avatars.js"></script>
  <script src="/js/steam-ui.js"></script>
  <script src="/js/gsi-setup.js"></script>
  <script src="/js/shell.js"></script>
  <script src="/js/nav.js"></script>
  <script src="/js/profiles.js"></script>
</body>
</html>
